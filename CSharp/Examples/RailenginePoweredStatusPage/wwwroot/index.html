<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>railtown.ai system metrics</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>railtown.ai system metrics</h1>
  <div class="charts"></div>

  <p id="error" class="error" hidden></p>

  <footer class="powered-by">
    <span>Powered by</span>
    <a href="https://railengine.ai/" target="_blank" rel="noopener noreferrer">
      <img src="cropped-Railengine_logo_dark-1-scaled-1-2048x585.png" alt="Railengine" />
    </a>
  </footer>

  <script>
    // To adapt this status page, edit only this list. Add, remove, rename,
    // or recolor metrics here — the cards render automatically from it.
    //   key:         matches the `metric` field on records returned by /api/metrics
    //   label:       shown as the card header
    //   unit:        appended after the latest reading
    //   color:       line + fill color (any CSS color)
    //   hideRepeats: optional. When true, point markers are suppressed for samples
    //                whose value matches the previous one. Useful for metrics that
    //                report constantly and you only want to highlight changes.
    const METRICS = [
      { key: 'engine-load',  label: 'Railengine',    unit: 'bytes/min', color: '#6366f1' },
      { key: 'team-members', label: 'Users',         unit: 'users',     color: '#22d3ee', hideRepeats: true },
      { key: 'logs',         label: 'Conductr Logs', unit: 'logs/min',  color: '#34d399' },
    ];

    const REFRESH_INTERVAL_MS = 5 * 60 * 1000;

    function buildCards(metrics, container) {
      for (const metric of metrics) {
        const card = document.createElement('div');
        card.className = 'card';

        const heading = document.createElement('h2');
        heading.append(metric.label);
        const latest = document.createElement('span');
        latest.className = 'latest';
        heading.append(latest);

        const wrap = document.createElement('div');
        wrap.className = 'chart-wrap';
        const canvas = document.createElement('canvas');
        wrap.append(canvas);

        card.append(heading, wrap);
        container.append(card);

        metric.latestEl = latest;
        metric.canvas = canvas;
      }
    }

    function formatTimestamp(ms) {
      return new Date(ms).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function formatLatest(value, unit) {
      return `${value.toFixed(2).replace(/\.00$/, '')} ${unit}`;
    }

    function buildChart(canvas, labels, values, color, hideRepeats) {
      const pointRadius = hideRepeats
        ? ctx => {
            const data = ctx.dataset.data;
            const i = ctx.dataIndex;
            return i > 0 && data[i] === data[i - 1] ? 0 : 4;
          }
        : 4;

      return new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: color,
            backgroundColor: color + '22',
            borderWidth: 2,
            pointRadius,
            pointHoverRadius: 6,
            fill: true,
            tension: 0.3,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#64748b' }, grid: { color: '#2d3248' } },
            y: { ticks: { color: '#64748b' }, grid: { color: '#2d3248' } },
          },
        },
      });
    }

    async function loadMetrics() {
      const res = await fetch('/api/metrics');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function refresh() {
      try {
        const records = await loadMetrics();

        document.getElementById('error').hidden = true;
        document.querySelector('.charts').hidden = false;

        for (const metric of METRICS) {
          const subset = records
            .filter(r => r.metric === metric.key)
            .sort((a, b) => a.timestamp - b.timestamp);

          const labels = subset.map(r => formatTimestamp(r.timestamp));
          const values = subset.map(r => r.value);

          const latest = values.length ? values[values.length - 1] : 0;
          metric.latestEl.textContent = formatLatest(latest, metric.unit);

          if (metric.chart) {
            metric.chart.data.labels = labels;
            metric.chart.data.datasets[0].data = values;
            metric.chart.update();
          } else {
            metric.chart = buildChart(metric.canvas, labels, values, metric.color, metric.hideRepeats);
          }
        }
      } catch (err) {
        document.querySelector('.charts').hidden = true;
        const el = document.getElementById('error');
        el.textContent = `Failed to load metrics: ${err.message}`;
        el.hidden = false;
      }
    }

    buildCards(METRICS, document.querySelector('.charts'));
    refresh();
    setInterval(refresh, REFRESH_INTERVAL_MS);
  </script>
</body>
</html>
